name: Deploy

# CD is manual-only until you re-enable automatic deploys. Pushes do not run this workflow.
# To deploy: Actions → Deploy → Run workflow (requires CI artifact from a recent run on the same branch).
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-oracle
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend artifact (latest CI on this branch)
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci.yml
          branch: ${{ github.ref_name }}
          name: frontend-dist
          path: dist
          if_no_artifact_found: fail

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync static site
        run: |
          rsync -avz --delete -e ssh dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/rag/"

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DP="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DP" ]; then DP="/opt/rag-project"; fi
            cd "$DP"
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build
