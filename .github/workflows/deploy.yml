name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-oracle
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: frontend-dist
          path: dist

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync static site
        run: |
          rsync -avz --delete -e ssh dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/rag/"

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DP="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DP" ]; then DP="/opt/rag-project"; fi
            cd "$DP"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build
